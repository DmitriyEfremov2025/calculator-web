<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Web Calculator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="top-bar">
        <div>
          <h1>Калькулятор</h1>
          <p class="subtitle">Быстрые вычисления на Go + JavaScript</p>
        </div>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Переключить тему">🌙</button>
      </div>
      <form id="calc-form">
        <div class="row">
          <label for="left">Число</label>
          <input id="left" type="number" step="any" required placeholder="Введите число" />
        </div>
        <div class="row">
          <label>Операция</label>
          <div class="operations" id="operations">
            <button type="button" class="op-btn active" data-op="+">+</button>
            <button type="button" class="op-btn" data-op="-">-</button>
            <button type="button" class="op-btn" data-op="*">×</button>
            <button type="button" class="op-btn" data-op="/">÷</button>
            <button type="button" class="op-btn" data-op="square">x²</button>
            <button type="button" class="op-btn" data-op="sqrt">√x</button>
          </div>
          <input id="op" type="hidden" value="+" />
        </div>
        <div class="row" id="right-row">
          <label for="right">Второе число</label>
          <input id="right" type="number" step="any" required placeholder="Введите второе число" />
        </div>
        <button type="submit" class="submit-btn">Вычислить</button>
      </form>

      <div id="result" class="result">Результат появится здесь</div>
      <div class="result-actions">
        <button id="copy-result" type="button" class="secondary-btn">Скопировать результат</button>
      </div>

      <section class="history">
        <div class="history-header">
          <h2>История вычислений</h2>
          <button id="clear-history" type="button" class="secondary-btn">Очистить</button>
        </div>
        <ul id="history-list" class="history-list"></ul>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
