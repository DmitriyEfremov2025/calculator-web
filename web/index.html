<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Web Calculator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="top-bar">
        <div>
          <h1>Калькулятор</h1>
          <p class="subtitle">Один экран по центру и кнопки под ним</p>
        </div>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Переключить тему">🌙</button>
      </div>

      <section class="calculator">
        <div id="screen" class="screen">0</div>
        <div class="keypad">
          <button type="button" class="key key-action" data-action="clear">C</button>
          <button type="button" class="key key-action" data-action="backspace">⌫</button>
          <button type="button" class="key key-op" data-op="square">x²</button>
          <button type="button" class="key key-op" data-op="sqrt">√x</button>

          <button type="button" class="key key-number" data-digit="7">7</button>
          <button type="button" class="key key-number" data-digit="8">8</button>
          <button type="button" class="key key-number" data-digit="9">9</button>
          <button type="button" class="key key-op" data-op="/">÷</button>

          <button type="button" class="key key-number" data-digit="4">4</button>
          <button type="button" class="key key-number" data-digit="5">5</button>
          <button type="button" class="key key-number" data-digit="6">6</button>
          <button type="button" class="key key-op" data-op="*">×</button>

          <button type="button" class="key key-number" data-digit="1">1</button>
          <button type="button" class="key key-number" data-digit="2">2</button>
          <button type="button" class="key key-number" data-digit="3">3</button>
          <button type="button" class="key key-op" data-op="-">−</button>

          <button type="button" class="key key-number" data-digit="0">0</button>
          <button type="button" class="key key-number" data-digit=".">.</button>
          <button type="button" class="key key-eq" data-action="equals">=</button>
          <button type="button" class="key key-op" data-op="+">+</button>
        </div>
      </section>

      <div id="result" class="result">Готов к вычислениям</div>
      <div class="result-actions">
        <button id="copy-result" type="button" class="secondary-btn">Скопировать результат</button>
      </div>

      <section class="history">
        <div class="history-header">
          <h2>История вычислений</h2>
          <button id="clear-history" type="button" class="secondary-btn">Очистить</button>
        </div>
        <ul id="history-list" class="history-list"></ul>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
